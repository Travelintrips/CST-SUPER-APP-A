kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 5000
name = "API Server"
paths = ["/api"]

[services.development]
run = "fuser -k 5000/tcp 2>/dev/null || true; sleep 1; node --enable-source-maps /home/runner/workspace/artifacts/api-server/dist/index.mjs"

[services.development.env]
PORT = "5000"
NODE_ENV = "development"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "5000"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
