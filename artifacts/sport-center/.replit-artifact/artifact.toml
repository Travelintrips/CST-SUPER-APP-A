kind = "web"
previewPath = "/sport-center/"
title = "Sport Center — Website"
version = "1.0.0"
id = "artifacts/sport-center"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/sport-center/" ]
localPort = 8082

[services.development]
run = "pnpm --filter @workspace/sport-center run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sport-center", "run", "build" ]
publicDir = "artifacts/sport-center/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "8082"
BASE_PATH = "/sport-center/"

[services.production.env]
BASE_PATH = "/sport-center/"
