<svg viewBox="0 0 900 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="wm-grid" width="45" height="36" patternUnits="userSpaceOnUse">
      <path d="M 45 0 L 0 0 0 36" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.7"/>
    </pattern>
  </defs>

  <!-- Grid backdrop -->
  <rect width="900" height="480" fill="url(#wm-grid)"/>

  <!-- ── Continent fills + strokes (stronger) ── -->

  <!-- North America -->
  <path d="M 60 75 L 100 55 L 160 50 L 220 58 L 260 75
           L 275 110 L 268 145 L 280 170 L 265 215
           L 245 255 L 210 275 L 175 268 L 148 255
           L 118 240 L 88 210 L 62 180 L 52 140 Z"
        fill="rgba(223,247,255,0.09)" stroke="#DFF7FF" stroke-width="1.4" stroke-opacity="0.70" stroke-linejoin="round"/>

  <!-- Central America nub -->
  <path d="M 210 275 L 225 290 L 218 310 L 200 315 L 190 300 L 195 280 Z"
        fill="rgba(223,247,255,0.07)" stroke="#DFF7FF" stroke-width="0.9" stroke-opacity="0.50"/>

  <!-- South America -->
  <path d="M 195 310 L 240 295 L 270 308 L 285 340 L 290 385
           L 275 430 L 248 455 L 215 458 L 188 440
           L 168 410 L 162 370 L 170 330 Z"
        fill="rgba(223,247,255,0.09)" stroke="#DFF7FF" stroke-width="1.4" stroke-opacity="0.68" stroke-linejoin="round"/>

  <!-- Europe -->
  <path d="M 415 65 L 470 58 L 510 62 L 535 80 L 528 108
           L 510 125 L 490 135 L 465 130 L 445 118 L 425 105 L 418 85 Z"
        fill="rgba(223,247,255,0.09)" stroke="#DFF7FF" stroke-width="1.4" stroke-opacity="0.70" stroke-linejoin="round"/>
  <path d="M 418 105 L 430 112 L 425 128 L 412 122 Z"
        fill="rgba(223,247,255,0.07)" stroke="#DFF7FF" stroke-width="0.8" stroke-opacity="0.48"/>
  <path d="M 460 58 L 475 42 L 492 38 L 498 58 L 480 65 Z"
        fill="rgba(223,247,255,0.07)" stroke="#DFF7FF" stroke-width="0.9" stroke-opacity="0.52"/>
  <ellipse cx="410" cy="80" rx="9" ry="13"
        fill="rgba(223,247,255,0.07)" stroke="#DFF7FF" stroke-width="0.8" stroke-opacity="0.48"/>

  <!-- Africa -->
  <path d="M 428 155 L 498 148 L 538 158 L 558 190 L 565 240
           L 558 300 L 540 360 L 510 400 L 478 412
           L 448 405 L 422 380 L 408 330 L 404 260 L 408 200 Z"
        fill="rgba(223,247,255,0.09)" stroke="#DFF7FF" stroke-width="1.4" stroke-opacity="0.68" stroke-linejoin="round"/>
  <path d="M 558 225 L 582 215 L 598 230 L 572 250 L 558 245 Z"
        fill="rgba(223,247,255,0.07)" stroke="#DFF7FF" stroke-width="0.8" stroke-opacity="0.45"/>

  <!-- Asia (main body) -->
  <path d="M 535 50 L 620 44 L 710 40 L 790 48 L 850 62
           L 868 92 L 858 130 L 838 160 L 808 178
           L 770 185 L 740 175 L 718 185 L 688 195
           L 652 200 L 615 185 L 590 170 L 565 175
           L 545 160 L 536 130 L 535 95 Z"
        fill="rgba(223,247,255,0.09)" stroke="#DFF7FF" stroke-width="1.4" stroke-opacity="0.70" stroke-linejoin="round"/>

  <!-- Arabian Peninsula -->
  <path d="M 558 162 L 598 155 L 618 170 L 620 200 L 598 215 L 570 205 L 555 188 Z"
        fill="rgba(223,247,255,0.08)" stroke="#DFF7FF" stroke-width="1.0" stroke-opacity="0.55"/>

  <!-- Indian subcontinent -->
  <path d="M 620 175 L 650 172 L 665 195 L 660 240 L 638 268 L 620 260 L 608 235 L 610 200 Z"
        fill="rgba(223,247,255,0.08)" stroke="#DFF7FF" stroke-width="1.0" stroke-opacity="0.55"/>

  <!-- Southeast Asia -->
  <path d="M 718 185 L 760 182 L 782 200 L 778 232 L 755 248 L 728 240 L 710 220 Z"
        fill="rgba(223,247,255,0.08)" stroke="#DFF7FF" stroke-width="1.0" stroke-opacity="0.55"/>

  <!-- Malay / Java -->
  <ellipse cx="790" cy="265" rx="22" ry="9" fill="rgba(223,247,255,0.07)" stroke="#DFF7FF" stroke-width="0.8" stroke-opacity="0.45"/>
  <ellipse cx="822" cy="278" rx="15" ry="7" fill="rgba(223,247,255,0.06)" stroke="#DFF7FF" stroke-width="0.7" stroke-opacity="0.38"/>

  <!-- Australia -->
  <path d="M 730 288 L 840 278 L 870 310 L 872 355 L 850 392
           L 808 405 L 762 398 L 730 370 L 718 330 Z"
        fill="rgba(223,247,255,0.09)" stroke="#DFF7FF" stroke-width="1.4" stroke-opacity="0.68" stroke-linejoin="round"/>

  <!-- Japan -->
  <ellipse cx="858" cy="108" rx="13" ry="6" transform="rotate(-30 858 108)"
        fill="rgba(223,247,255,0.08)" stroke="#DFF7FF" stroke-width="0.9" stroke-opacity="0.55"/>
  <ellipse cx="848" cy="125" rx="9" ry="4" transform="rotate(-25 848 125)"
        fill="rgba(223,247,255,0.07)" stroke="#DFF7FF" stroke-width="0.7" stroke-opacity="0.45"/>

  <!-- ── Connection arcs ── -->

  <!-- Shanghai → Rotterdam -->
  <path d="M 820 108 Q 680 20 470 90"
        stroke="#38BDF8" stroke-width="2.0" stroke-opacity="0.70" stroke-dasharray="9 6" fill="none"/>

  <!-- Shanghai → Los Angeles (transpacific wrap) -->
  <path d="M 820 108 Q 900 55 900 148 Q 900 200 265 178"
        stroke="white" stroke-width="1.7" stroke-opacity="0.42" stroke-dasharray="9 6" fill="none"/>

  <!-- Rotterdam → New York -->
  <path d="M 470 90 Q 355 42 248 148"
        stroke="white" stroke-width="1.8" stroke-opacity="0.55" stroke-dasharray="9 6" fill="none"/>

  <!-- Dubai → Shanghai -->
  <path d="M 600 178 Q 710 100 820 108"
        stroke="#38BDF8" stroke-width="1.7" stroke-opacity="0.60" stroke-dasharray="8 5" fill="none"/>

  <!-- Dubai → Rotterdam -->
  <path d="M 600 178 Q 535 100 470 90"
        stroke="#38BDF8" stroke-width="1.5" stroke-opacity="0.52" stroke-dasharray="7 5" fill="none"/>

  <!-- Singapore → Dubai -->
  <path d="M 768 240 Q 684 195 600 178"
        stroke="#38BDF8" stroke-width="1.5" stroke-opacity="0.50" stroke-dasharray="6 4" fill="none"/>

  <!-- Singapore → Shanghai -->
  <path d="M 768 240 Q 795 168 820 108"
        stroke="#38BDF8" stroke-width="1.3" stroke-opacity="0.48" stroke-dasharray="6 4" fill="none"/>

  <!-- Sydney → Singapore -->
  <path d="M 790 340 Q 785 285 768 240"
        stroke="#38BDF8" stroke-width="1.3" stroke-opacity="0.42" stroke-dasharray="5 4" fill="none"/>

  <!-- New York → Los Angeles -->
  <path d="M 248 148 Q 215 175 148 178"
        stroke="white" stroke-width="1.2" stroke-opacity="0.35" stroke-dasharray="5 4" fill="none"/>

  <!-- ── Hub dots with glow ── -->

  <!-- Shanghai (primary) -->
  <circle cx="820" cy="108" r="20" fill="rgba(56,189,248,0.14)" filter="url(#glow-strong)"/>
  <circle cx="820" cy="108" r="10" fill="rgba(56,189,248,0.38)"/>
  <circle cx="820" cy="108" r="5" fill="#FFFFFF" fill-opacity="0.95" filter="url(#glow)"/>

  <!-- Rotterdam (primary) -->
  <circle cx="470" cy="90" r="18" fill="rgba(255,255,255,0.12)" filter="url(#glow-strong)"/>
  <circle cx="470" cy="90" r="9" fill="rgba(255,255,255,0.38)"/>
  <circle cx="470" cy="90" r="4.5" fill="#FFFFFF" fill-opacity="0.95" filter="url(#glow)"/>

  <!-- New York (primary) -->
  <circle cx="248" cy="148" r="18" fill="rgba(255,255,255,0.12)" filter="url(#glow-strong)"/>
  <circle cx="248" cy="148" r="9" fill="rgba(255,255,255,0.38)"/>
  <circle cx="248" cy="148" r="4.5" fill="#FFFFFF" fill-opacity="0.95" filter="url(#glow)"/>

  <!-- Dubai (primary) -->
  <circle cx="600" cy="178" r="17" fill="rgba(56,189,248,0.14)" filter="url(#glow-strong)"/>
  <circle cx="600" cy="178" r="8.5" fill="rgba(56,189,248,0.38)"/>
  <circle cx="600" cy="178" r="4" fill="#FFFFFF" fill-opacity="0.95" filter="url(#glow)"/>

  <!-- Singapore (primary) -->
  <circle cx="768" cy="240" r="17" fill="rgba(56,189,248,0.14)" filter="url(#glow-strong)"/>
  <circle cx="768" cy="240" r="8.5" fill="rgba(56,189,248,0.38)"/>
  <circle cx="768" cy="240" r="4" fill="#FFFFFF" fill-opacity="0.95" filter="url(#glow)"/>

  <!-- Los Angeles (primary) -->
  <circle cx="148" cy="178" r="16" fill="rgba(255,255,255,0.10)" filter="url(#glow-strong)"/>
  <circle cx="148" cy="178" r="8" fill="rgba(255,255,255,0.35)"/>
  <circle cx="148" cy="178" r="4" fill="#FFFFFF" fill-opacity="0.92" filter="url(#glow)"/>

  <!-- Sydney (primary) -->
  <circle cx="790" cy="340" r="14" fill="rgba(56,189,248,0.12)" filter="url(#glow)"/>
  <circle cx="790" cy="340" r="7" fill="rgba(56,189,248,0.35)"/>
  <circle cx="790" cy="340" r="3.5" fill="#FFFFFF" fill-opacity="0.90" filter="url(#glow)"/>

  <!-- Secondary hubs -->
  <!-- Mumbai -->
  <circle cx="635" cy="220" r="7" fill="rgba(56,189,248,0.30)" filter="url(#glow)"/>
  <circle cx="635" cy="220" r="3.5" fill="#FFFFFF" fill-opacity="0.85"/>
  <!-- Tokyo -->
  <circle cx="858" cy="122" r="7" fill="rgba(255,255,255,0.28)" filter="url(#glow)"/>
  <circle cx="858" cy="122" r="3.5" fill="#FFFFFF" fill-opacity="0.85"/>
  <!-- Busan -->
  <circle cx="840" cy="112" r="5" fill="rgba(255,255,255,0.22)"/>
  <circle cx="840" cy="112" r="2.5" fill="#FFFFFF" fill-opacity="0.75"/>

  <!-- ── Ship silhouette ── -->
  <g transform="translate(554 148) rotate(-4)" opacity="0.65">
    <rect x="-20" y="-5" width="40" height="11" rx="5" fill="white"/>
    <rect x="-11" y="-14" width="16" height="10" rx="1.5" fill="rgba(255,255,255,0.85)"/>
    <polygon points="20,-5 30,6 10,6" fill="rgba(255,255,255,0.60)"/>
  </g>

  <!-- ── Plane silhouette ── -->
  <g transform="translate(358 62) rotate(14)" opacity="0.62">
    <ellipse cx="0" cy="0" rx="15" ry="3.5" fill="white"/>
    <path d="M -5 0 L -18 8 L -11 0 L -18 -8 Z" fill="rgba(255,255,255,0.90)"/>
    <path d="M 10 0 L 19 5 L 15 0 L 19 -5 Z" fill="rgba(255,255,255,0.90)"/>
  </g>

  <!-- ── Waypoint dots along routes ── -->
  <circle cx="645" cy="48" r="2.8" fill="#38BDF8" fill-opacity="0.80" filter="url(#glow)"/>
  <circle cx="568" cy="32" r="2.2" fill="#38BDF8" fill-opacity="0.65"/>
  <circle cx="353" cy="42" r="2.8" fill="white" fill-opacity="0.70" filter="url(#glow)"/>
  <circle cx="685" cy="200" r="2.5" fill="#38BDF8" fill-opacity="0.72"/>
  <circle cx="546" cy="130" r="2.5" fill="#38BDF8" fill-opacity="0.68"/>
  <circle cx="779" cy="170" r="2.2" fill="#38BDF8" fill-opacity="0.62"/>
  <circle cx="192" cy="120" r="2.2" fill="white" fill-opacity="0.60"/>
</svg>
