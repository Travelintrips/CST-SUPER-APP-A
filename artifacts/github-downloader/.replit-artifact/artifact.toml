kind = "web"
previewPath = "/"
title = "GitHub Downloader"
version = "1.0.0"
id = "artifacts/github-downloader"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19326

[services.development]
run = "pnpm --filter @workspace/github-downloader run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/github-downloader", "run", "build" ]
publicDir = "artifacts/github-downloader/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19326"
BASE_PATH = "/"
