kind = "web"
previewPath = "/dl/"
title = "GitHub Downloader"
version = "1.0.0"
id = "artifacts/github-downloader"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/dl/" ]
localPort = 19326

[services.development]
run = "pnpm --filter @workspace/github-downloader run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/github-downloader", "run", "build" ]
publicDir = "artifacts/github-downloader/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/dl/*"
to = "/dl/index.html"

[services.env]
PORT = "19326"
BASE_PATH = "/dl/"
