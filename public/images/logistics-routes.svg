<svg width="760" height="420" viewBox="0 0 760 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="dot-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Abstract continent fills -->
  <!-- North America -->
  <path d="M 28 95 L 78 80 L 132 84 L 160 108 L 154 148 L 132 172 L 98 180 L 65 168 L 40 148 L 28 120 Z"
        fill="rgba(255,255,255,0.055)" stroke="white" stroke-opacity="0.28" stroke-width="1.1" stroke-linejoin="round"/>
  <!-- Europe -->
  <path d="M 292 70 L 348 64 L 376 80 L 372 104 L 350 118 L 322 114 L 298 98 Z"
        fill="rgba(255,255,255,0.055)" stroke="white" stroke-opacity="0.28" stroke-width="1.1" stroke-linejoin="round"/>
  <!-- Scandinavia -->
  <path d="M 322 64 L 332 48 L 348 44 L 352 64 L 338 70 Z"
        fill="rgba(255,255,255,0.04)" stroke="white" stroke-opacity="0.20" stroke-width="0.8"/>
  <!-- Africa -->
  <path d="M 308 132 L 362 126 L 382 152 L 386 200 L 368 234 L 340 240 L 314 222 L 302 188 L 306 154 Z"
        fill="rgba(255,255,255,0.055)" stroke="white" stroke-opacity="0.24" stroke-width="1.0" stroke-linejoin="round"/>
  <!-- Asia -->
  <path d="M 418 50 L 555 44 L 598 72 L 590 112 L 558 130 L 500 132 L 448 120 L 418 96 Z"
        fill="rgba(255,255,255,0.055)" stroke="white" stroke-opacity="0.28" stroke-width="1.1" stroke-linejoin="round"/>
  <!-- Arabian Peninsula -->
  <path d="M 422 138 L 455 132 L 468 148 L 466 178 L 445 192 L 422 182 L 412 162 Z"
        fill="rgba(255,255,255,0.045)" stroke="white" stroke-opacity="0.20" stroke-width="0.9"/>
  <!-- SE Asia -->
  <path d="M 600 105 L 645 100 L 662 120 L 656 150 L 630 160 L 606 148 Z"
        fill="rgba(255,255,255,0.045)" stroke="white" stroke-opacity="0.20" stroke-width="0.9"/>
  <!-- South America -->
  <path d="M 145 250 L 192 238 L 214 256 L 220 298 L 206 338 L 178 352 L 154 340 L 138 308 L 140 268 Z"
        fill="rgba(255,255,255,0.055)" stroke="white" stroke-opacity="0.24" stroke-width="1.0" stroke-linejoin="round"/>
  <!-- Australia -->
  <path d="M 625 270 L 718 262 L 738 294 L 736 332 L 714 352 L 678 356 L 648 338 L 632 306 Z"
        fill="rgba(255,255,255,0.055)" stroke="white" stroke-opacity="0.24" stroke-width="1.0" stroke-linejoin="round"/>

  <!-- Route 1: Americas → Europe → Asia (main arc) -->
  <path d="M 95 148 C 190 100 270 120 348 100 C 440 78 510 90 640 120"
        stroke="white" stroke-opacity="0.50" stroke-width="2.2" stroke-dasharray="9 8" fill="none"/>

  <!-- Route 2: Europe → Middle East → Asia lower arc -->
  <path d="M 340 100 C 388 160 432 162 560 132"
        stroke="#38BDF8" stroke-opacity="0.55" stroke-width="2.0" stroke-dasharray="8 8" fill="none"/>

  <!-- Route 3: Europe → Americas transatlantic -->
  <path d="M 340 100 C 260 72 200 80 95 148"
        stroke="white" stroke-opacity="0.40" stroke-width="1.8" stroke-dasharray="7 9" fill="none"/>

  <!-- Route 4: Asia → Australia -->
  <path d="M 640 120 C 662 180 660 230 680 290"
        stroke="#38BDF8" stroke-opacity="0.42" stroke-width="1.6" stroke-dasharray="6 8" fill="none"/>

  <!-- Route 5: Americas → South America -->
  <path d="M 95 148 C 130 195 148 215 168 268"
        stroke="white" stroke-opacity="0.32" stroke-width="1.4" stroke-dasharray="5 8" fill="none"/>

  <!-- Route 6: Africa → Asia -->
  <path d="M 344 135 C 380 162 406 162 432 158"
        stroke="white" stroke-opacity="0.30" stroke-width="1.3" stroke-dasharray="5 7" fill="none"/>

  <!-- Route 7: Long lower sea route -->
  <path d="M 168 268 C 320 310 480 295 640 290"
        stroke="white" stroke-opacity="0.22" stroke-width="1.2" stroke-dasharray="5 9" fill="none"/>

  <!-- ── Hub connection dots with glow ── -->

  <!-- New York / Americas hub -->
  <circle cx="95" cy="148" r="18" fill="rgba(255,255,255,0.08)" filter="url(#dot-glow)"/>
  <circle cx="95" cy="148" r="8" fill="rgba(255,255,255,0.25)"/>
  <circle cx="95" cy="148" r="4" fill="white" fill-opacity="0.95" filter="url(#dot-glow)"/>

  <!-- Rotterdam / Europe hub -->
  <circle cx="340" cy="100" r="18" fill="rgba(255,255,255,0.08)" filter="url(#dot-glow)"/>
  <circle cx="340" cy="100" r="8" fill="rgba(255,255,255,0.25)"/>
  <circle cx="340" cy="100" r="4" fill="white" fill-opacity="0.95" filter="url(#dot-glow)"/>

  <!-- Dubai / Middle East hub -->
  <circle cx="432" cy="158" r="17" fill="rgba(56,189,248,0.12)" filter="url(#dot-glow)"/>
  <circle cx="432" cy="158" r="8" fill="rgba(56,189,248,0.28)"/>
  <circle cx="432" cy="158" r="4" fill="white" fill-opacity="0.95" filter="url(#dot-glow)"/>

  <!-- Shanghai / Asia hub -->
  <circle cx="640" cy="120" r="19" fill="rgba(56,189,248,0.12)" filter="url(#dot-glow)"/>
  <circle cx="640" cy="120" r="9" fill="rgba(56,189,248,0.28)"/>
  <circle cx="640" cy="120" r="4.5" fill="white" fill-opacity="0.95" filter="url(#dot-glow)"/>

  <!-- Singapore hub -->
  <circle cx="635" cy="155" r="14" fill="rgba(56,189,248,0.10)" filter="url(#dot-glow)"/>
  <circle cx="635" cy="155" r="7" fill="rgba(56,189,248,0.25)"/>
  <circle cx="635" cy="155" r="3.5" fill="white" fill-opacity="0.90"/>

  <!-- Sydney hub -->
  <circle cx="680" cy="290" r="13" fill="rgba(56,189,248,0.10)"/>
  <circle cx="680" cy="290" r="6.5" fill="rgba(56,189,248,0.22)"/>
  <circle cx="680" cy="290" r="3" fill="white" fill-opacity="0.88" filter="url(#dot-glow)"/>

  <!-- São Paulo hub -->
  <circle cx="168" cy="268" r="12" fill="rgba(255,255,255,0.08)"/>
  <circle cx="168" cy="268" r="6" fill="rgba(255,255,255,0.20)"/>
  <circle cx="168" cy="268" r="3" fill="white" fill-opacity="0.82"/>

  <!-- Minor hubs -->
  <circle cx="344" cy="135" r="5" fill="rgba(255,255,255,0.20)"/>
  <circle cx="344" cy="135" r="2.5" fill="white" fill-opacity="0.75"/>
  <circle cx="560" cy="132" r="5" fill="rgba(56,189,248,0.20)"/>
  <circle cx="560" cy="132" r="2.5" fill="white" fill-opacity="0.75"/>

  <!-- ── Plane silhouette (transatlantic) ── -->
  <g transform="translate(220 82) rotate(10)" opacity="0.60">
    <ellipse cx="0" cy="0" rx="14" ry="3" fill="white"/>
    <path d="M -4 0 L -16 7 L -10 0 L -16 -7 Z" fill="rgba(255,255,255,0.88)"/>
    <path d="M 10 0 L 18 4 L 14 0 L 18 -4 Z" fill="rgba(255,255,255,0.88)"/>
  </g>

  <!-- ── Ship silhouette (Asia route) ── -->
  <g transform="translate(495 128) rotate(-3)" opacity="0.58">
    <rect x="-18" y="-4" width="36" height="10" rx="4" fill="white"/>
    <rect x="-9" y="-12" width="14" height="9" rx="1.5" fill="rgba(255,255,255,0.82)"/>
    <polygon points="18,-4 27,6 9,6" fill="rgba(255,255,255,0.55)"/>
  </g>

  <!-- ── Truck icon (land route hint) ── -->
  <g transform="translate(390 90) rotate(0)" opacity="0.48">
    <rect x="-14" y="-5" width="22" height="10" rx="2" fill="white"/>
    <rect x="8" y="-3" width="10" height="8" rx="1" fill="rgba(255,255,255,0.80)"/>
    <circle cx="-8" cy="6" r="3" fill="rgba(255,255,255,0.90)"/>
    <circle cx="8" cy="6" r="3" fill="rgba(255,255,255,0.90)"/>
    <circle cx="15" cy="6" r="3" fill="rgba(255,255,255,0.85)"/>
  </g>

  <!-- ── Waypoint dots along routes ── -->
  <circle cx="490" cy="92" r="2.5" fill="#38BDF8" fill-opacity="0.75"/>
  <circle cx="195" cy="105" r="2.2" fill="white" fill-opacity="0.65"/>
  <circle cx="590" cy="128" r="2.2" fill="#38BDF8" fill-opacity="0.68"/>
  <circle cx="660" cy="205" r="2.2" fill="#38BDF8" fill-opacity="0.60"/>
  <circle cx="132" cy="200" r="2" fill="white" fill-opacity="0.58"/>
  <circle cx="392" cy="300" r="2" fill="white" fill-opacity="0.50"/>
</svg>
