        data:
          type: array
          items: { $ref: "#/components/schemas/SalesDocument" }
        pagination:
          $ref: "#/components/schemas/Pagination"

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    AuthUser:
      type: object
      properties:
        id: { type: string }
