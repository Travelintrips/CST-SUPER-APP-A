openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: BizPortal Multi-Division API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management
  - name: ecommerce
    description: E-commerce division
  - name: trading
    description: Trading division
  - name: logistics
    description: Logistics division
  - name: pos
    description: Point of Sale division
  - name: dashboard
    description: Dashboard summary
  - name: sales
    description: Sales — quotations, orders, customers, invoices
  - name: purchase
    description: Purchase — RFQ, purchase orders, vendors, bills
  - name: reports
    description: Business reports — sales, purchase, AR/AP aging
  - name: payments
    description: Payments — Paylabs payment links and webhooks
  - name: accounting
    description: Accounting — chart of accounts, journals, journal entries, financial reports

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get current user profile and role
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /users/{id}:
    put:
      operationId: updateUser
      tags: [users]
      summary: Update a user's role and division (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get aggregated summary for all divisions
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /ecommerce/products:
    get:
      operationId: listProducts
      tags: [ecommerce]
      summary: List all products
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [ecommerce]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /ecommerce/products/{id}:
    get:
      operationId: getProduct
      tags: [ecommerce]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    put:
      operationId: updateProduct
      tags: [ecommerce]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [ecommerce]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /ecommerce/orders:
    get:
      operationId: listOrders
      tags: [ecommerce]
      summary: List all orders
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [ecommerce]
      summary: Create an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /ecommerce/orders/{id}:
    put:
      operationId: updateOrder
      tags: [ecommerce]
      summary: Update an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    delete:
      operationId: deleteOrder
      tags: [ecommerce]
      summary: Delete an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /trading/stocks:
    get:
      operationId: listStocks
      tags: [trading]
      summary: List all stock items
      responses:
        "200":
          description: Stock list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockItem"
    post:
      operationId: createStockItem
      tags: [trading]
      summary: Create stock item / purchase from supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStockItemBody"
      responses:
        "201":
          description: Created stock item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockItem"

  /trading/stocks/{id}:
    put:
      operationId: updateStockItem
      tags: [trading]
      summary: Update a stock item
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStockItemBody"
      responses:
        "200":
          description: Updated stock item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
    delete:
      operationId: deleteStockItem
      tags: [trading]
      summary: Delete a stock item
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /trading/suppliers:
    get:
      operationId: listSuppliers
      tags: [trading]
      summary: List all suppliers
      responses:
        "200":
          description: Suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [trading]
      summary: Add a supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierBody"
      responses:
        "201":
          description: Created supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /trading/suppliers/{id}:
    put:
      operationId: updateSupplier
      tags: [trading]
      summary: Update a supplier
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierBody"
      responses:
        "200":
          description: Updated supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
    delete:
      operationId: deleteSupplier
      tags: [trading]
      summary: Delete a supplier
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /logistics/shipments:
    get:
      operationId: listShipments
      tags: [logistics]
      summary: List all shipments
      responses:
        "200":
          description: Shipments list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shipment"
    post:
      operationId: createShipment
      tags: [logistics]
      summary: Create a shipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShipmentBody"
      responses:
        "201":
          description: Created shipment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"

  /logistics/shipments/{id}:
    put:
      operationId: updateShipmentStatus
      tags: [logistics]
      summary: Update shipment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShipmentStatusBody"
      responses:
        "200":
          description: Updated shipment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"

  /pos/transactions:
    get:
      operationId: listTransactions
      tags: [pos]
      summary: List all POS transactions
      responses:
        "200":
          description: Transactions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [pos]
      summary: Record a POS transaction (sale)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionBody"
      responses:
        "201":
          description: Created transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /pos/transactions/{id}/document:
    patch:
      operationId: updateTransactionDocument
      tags: [pos]
      summary: Attach or remove a supporting document URL on a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTransactionDocumentBody"
      responses:
        "200":
          description: Updated transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned URL for uploading a file to object storage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL and final object path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

  /pos/summary:
    get:
      operationId: getPosSummary
      tags: [pos]
      summary: Get POS daily/monthly summary
      responses:
        "200":
          description: POS summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosSummary"

  /sales/summary:
    get:
      operationId: getSalesSummary
      tags: [sales]
      summary: Sales dashboard summary
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesSummary"

  /sales/customers:
    get:
      operationId: listCustomers
      tags: [sales]
      summary: List customers
      responses:
        "200":
          description: Customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [sales]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /sales/customers/{id}:
    put:
      operationId: updateCustomer
      tags: [sales]
      summary: Update a customer
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [sales]
      summary: Delete a customer
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /sales/documents:
    get:
      operationId: listSalesDocuments
      tags: [sales]
      summary: List sales documents (quotations and orders)
      parameters:
        - in: query
          name: kind
          required: false
          schema:
            type: string
            enum: [quote, order]
        - in: query
          name: invoiceStatus
          required: false
          schema:
            type: string
            enum: [none, to_invoice, invoiced]
      responses:
        "200":
          description: Sales documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesDocument"
    post:
      operationId: createSalesDocument
      tags: [sales]
      summary: Create a sales document (quotation or order)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSalesDocumentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesDocument"

  /sales/documents/{id}:
    get:
      operationId: getSalesDocument
      tags: [sales]
      summary: Get a sales document with its lines
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sales document with lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesDocumentDetail"
    put:
      operationId: updateSalesDocument
      tags: [sales]
      summary: Update a sales document and its lines
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSalesDocumentBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesDocumentDetail"
    delete:
      operationId: deleteSalesDocument
      tags: [sales]
      summary: Delete a sales document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /sales/documents/{id}/action:
    post:
      operationId: salesDocumentAction
      tags: [sales]
      summary: Perform a workflow action on a sales document (send, confirm, cancel, invoice, deliver, draft)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalesDocumentActionBody"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesDocumentDetail"

  /purchase/summary:
    get:
      operationId: getPurchaseSummary
      tags: [purchase]
      summary: Purchase dashboard summary
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseSummary"

  /purchase/documents:
    get:
      operationId: listPurchaseDocuments
      tags: [purchase]
      summary: List purchase documents (RFQs and orders)
      parameters:
        - in: query
          name: kind
          required: false
          schema:
            type: string
            enum: [rfq, order]
        - in: query
          name: billStatus
          required: false
          schema:
            type: string
            enum: [none, to_bill, billed]
      responses:
        "200":
          description: Purchase documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseDocument"
    post:
      operationId: createPurchaseDocument
      tags: [purchase]
      summary: Create a purchase document (RFQ or order)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchaseDocumentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseDocument"

  /purchase/documents/{id}:
    get:
      operationId: getPurchaseDocument
      tags: [purchase]
      summary: Get a purchase document with its lines
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchase document with lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseDocumentDetail"
    put:
      operationId: updatePurchaseDocument
      tags: [purchase]
      summary: Update a purchase document and its lines
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchaseDocumentBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseDocumentDetail"
    delete:
      operationId: deletePurchaseDocument
      tags: [purchase]
      summary: Delete a purchase document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /purchase/documents/{id}/action:
    post:
      operationId: purchaseDocumentAction
      tags: [purchase]
      summary: Perform a workflow action on a purchase document (send, confirm, cancel, receive, bill, draft)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseDocumentActionBody"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseDocumentDetail"

  /reports/sales:
    get:
      operationId: getSalesReport
      tags: [reports]
      summary: Sales report (revenue by month, top customers, top products)
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Sales report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesReport"

  /reports/purchase:
    get:
      operationId: getPurchaseReport
      tags: [reports]
      summary: Purchase report (spend by month, top vendors, top products)
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Purchase report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseReport"

  /reports/ar-aging:
    get:
      operationId: getArAging
      tags: [reports]
      summary: Accounts receivable aging report
      responses:
        "200":
          description: AR aging
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgingReport"

  /reports/ap-aging:
    get:
      operationId: getApAging
      tags: [reports]
      summary: Accounts payable aging report
      responses:
        "200":
          description: AP aging
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgingReport"

  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List recent payments
      responses:
        "200":
          description: Payments list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"

  /payments/by-doc/{kind}/{id}:
    get:
      operationId: listPaymentsByDoc
      tags: [payments]
      summary: List payments for a document
      parameters:
        - in: path
          name: kind
          required: true
          schema: { type: string, enum: [sales, purchase] }
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"

  /payments/sales/{id}/create-link:
    post:
      operationId: createSalesPaymentLink
      tags: [payments]
      summary: Create Paylabs payment link for a sales order
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "201":
          description: Payment link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentLinkResponse"
        "202":
          description: Simulation mode (Paylabs not configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentLinkResponse"

  /payments/{id}/simulate-paid:
    post:
      operationId: simulatePaymentPaid
      tags: [payments]
      summary: Mark payment as paid (testing only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Updated payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

