openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: BizPortal Multi-Division API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management
  - name: ecommerce
    description: E-commerce division
  - name: trading
    description: Trading division
  - name: logistics
    description: Logistics division
  - name: pos
    description: Point of Sale division
  - name: dashboard
    description: Dashboard summary
  - name: sales
    description: Sales — quotations, orders, customers, invoices
  - name: purchase
    description: Purchase — RFQ, purchase orders, vendors, bills
  - name: reports
    description: Business reports — sales, purchase, AR/AP aging
  - name: payments
    description: Payments — Paylabs payment links and webhooks
  - name: accounting
    description: Accounting — chart of accounts, journals, journal entries, financial reports
  - name: portal
    description: Customer portal — public website, customer auth, and order lookup
  - name: logistic-orders
    description: Export Import & Logistic Ordering System — public booking and admin dashboard
  - name: ai-agent
    description: AI chat agent — conversational order creation and chat history

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      operationId: getCurrentAuthUser
      tags: [users]
      summary: Get current auth session user
      responses:
        "200":
          description: Auth user state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCurrentAuthUserResponse"

  /login:
    get:
      operationId: login
      tags: [users]
      summary: Redirect to OIDC login
      parameters:
        - in: query
          name: returnTo
          schema: { type: string }
      responses:
        "302":
          description: Redirect to OIDC provider

  /logout:
    get:
      operationId: logout
      tags: [users]
      summary: Clear session and redirect to OIDC end-session
      responses:
        "302":
          description: Redirect to OIDC end-session

  /callback:
    get:
      operationId: oidcCallback
      tags: [users]
      summary: OIDC callback — validates tokens and creates session
      responses:
        "302":
          description: Redirect to app

  /mobile-auth/token-exchange:
    post:
      operationId: exchangeMobileAuthorizationCode
      tags: [users]
      summary: Exchange PKCE auth code for a session token (mobile)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExchangeMobileAuthorizationCodeBody"
      responses:
        "200":
          description: Session token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeMobileAuthorizationCodeResponse"

  /mobile-auth/logout:
    post:
      operationId: logoutMobileSession
      tags: [users]
      summary: Delete mobile session
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutMobileSessionResponse"

  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get current user profile and role
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /users/{id}:
    put:
      operationId: updateUser
      tags: [users]
      summary: Update a user's role and division (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get aggregated summary for all divisions
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /ecommerce/products:
    get:
      operationId: listProducts
      tags: [ecommerce]
      summary: List all products / master items
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: itemType
          schema: { type: string }
        - in: query
          name: subcategory
          schema: { type: string }
        - in: query
          name: isActive
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedProducts"
    post:
      operationId: createProduct
      tags: [ecommerce]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /ecommerce/products/{id}:
    get:
      operationId: getProduct
      tags: [ecommerce]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    put:
      operationId: updateProduct
      tags: [ecommerce]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [ecommerce]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /ecommerce/product-categories:
    get:
      operationId: listProductCategories
      tags: [ecommerce]
      summary: List all product categories
      responses:
        "200":
          description: Product category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductCategory"
    post:
      operationId: createProductCategory
      tags: [ecommerce]
      summary: Create a product category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductCategoryBody"
      responses:
        "201":
          description: Created product category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductCategory"

  /ecommerce/product-categories/{id}:
    put:
      operationId: updateProductCategory
      tags: [ecommerce]
      summary: Rename a product category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductCategoryBody"
      responses:
        "200":
          description: Updated product category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductCategory"
    delete:
      operationId: deleteProductCategory
      tags: [ecommerce]
      summary: Delete a product category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /ecommerce/orders:
    get:
      operationId: listOrders
      tags: [ecommerce]
      summary: List all orders
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [ecommerce]
      summary: Create an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /ecommerce/orders/{id}:
    put:
      operationId: updateOrder
      tags: [ecommerce]
      summary: Update an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    delete:
      operationId: deleteOrder
      tags: [ecommerce]
      summary: Delete an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /trading/stocks:
    get:
      operationId: listStocks
      tags: [trading]
      summary: List all stock items
      responses:
        "200":
          description: Stock list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockItem"
    post:
      operationId: createStockItem
      tags: [trading]
      summary: Create stock item / purchase from supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStockItemBody"
      responses:
        "201":
          description: Created stock item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockItem"

  /trading/stocks/{id}:
    put:
      operationId: updateStockItem
      tags: [trading]
      summary: Update a stock item
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStockItemBody"
      responses:
        "200":
          description: Updated stock item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
    delete:
      operationId: deleteStockItem
      tags: [trading]
      summary: Delete a stock item
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /trading/suppliers:
    get:
      operationId: listSuppliers
      tags: [trading]
      summary: List all suppliers
      responses:
        "200":
          description: Suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [trading]
      summary: Add a supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierBody"
      responses:
        "201":
          description: Created supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /trading/suppliers/{id}/catalog:
    get:
      operationId: listVendorCatalog
      tags: [trading]
      summary: List catalog items for a vendor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Catalog items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VendorCatalogItem"
    post:
      operationId: createVendorCatalogItem
      tags: [trading]
      summary: Add a catalog item to a vendor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorCatalogItemBody"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorCatalogItem"

  /trading/suppliers/catalog/{itemId}:
    put:
      operationId: updateVendorCatalogItem
      tags: [trading]
      summary: Update a vendor catalog item
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorCatalogItemBody"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorCatalogItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
    delete:
      operationId: deleteVendorCatalogItem
      tags: [trading]
      summary: Delete a vendor catalog item
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /trading/suppliers/{id}:
    put:
      operationId: updateSupplier
      tags: [trading]
      summary: Update a supplier
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierBody"
      responses:
        "200":
          description: Updated supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
    delete:
      operationId: deleteSupplier
      tags: [trading]
      summary: Delete a supplier
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /logistics/shipments:
    get:
      operationId: listShipments
      tags: [logistics]
      summary: List all shipments
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Shipments list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedShipments"
    post:
      operationId: createShipment
      tags: [logistics]
      summary: Create a shipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShipmentBody"
      responses:
        "201":
          description: Created shipment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"

  /logistics/shipments/{id}:
    put:
      operationId: updateShipmentStatus
      tags: [logistics]
      summary: Update shipment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShipmentStatusBody"
      responses:
        "200":
          description: Updated shipment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"

  /logistics/freight-shipments:
    get:
      operationId: listFreightShipments
      tags: [logistics]
      summary: List all freight shipments
      parameters:
        - in: query
          name: salesDocId
          schema: { type: integer }
          required: false
      responses:
        "200":
          description: Freight shipments list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FreightShipment" }
    post:
      operationId: createFreightShipment
      tags: [logistics]
      summary: Create a freight shipment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateFreightShipmentBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FreightShipment" }

  /logistics/freight-shipments/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    get:
      operationId: getFreightShipment
      tags: [logistics]
      summary: Get a freight shipment with RFQs and quotes
      responses:
        "200":
          description: Freight shipment detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FreightShipmentDetail" }
    put:
      operationId: updateFreightShipment
      tags: [logistics]
      summary: Update a freight shipment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateFreightShipmentBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FreightShipment" }
    delete:
      operationId: deleteFreightShipment
      tags: [logistics]
      summary: Delete a freight shipment
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }

  /logistics/freight-shipments/{id}/profitability:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    get:
      operationId: getFreightShipmentProfitability
      tags: [logistics]
      summary: Get profitability report for a shipment
      responses:
        "200":
          description: Profitability data
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FreightShipmentProfitability" }

  /logistics/freight-shipments/{shipmentId}/stages:
    parameters:
      - { name: shipmentId, in: path, required: true, schema: { type: integer } }
    get:
      operationId: listShipmentStages
      tags: [logistics]
      summary: List operational stages for a shipment
      responses:
        "200":
          description: Stage list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ShipmentStage" }
    post:
      operationId: upsertShipmentStage
      tags: [logistics]
      summary: Upsert (create or update) a stage for a shipment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpsertShipmentStageBody" }
      responses:
        "200":
          description: Stage saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ShipmentStage" }

  /logistics/freight-shipments/{shipmentId}/attachments:
    parameters:
      - { name: shipmentId, in: path, required: true, schema: { type: integer } }
    get:
      operationId: listFreightAttachments
      tags: [logistics]
      summary: List attachments for a freight shipment
      responses:
        "200":
          description: Attachment list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FreightAttachment" }
    post:
      operationId: createFreightAttachment
      tags: [logistics]
      summary: Save attachment metadata after upload
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateFreightAttachmentBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FreightAttachment" }

  /logistics/freight-shipments/{shipmentId}/attachments/{attachmentId}:
    parameters:
      - { name: shipmentId, in: path, required: true, schema: { type: integer } }
      - { name: attachmentId, in: path, required: true, schema: { type: integer } }
    put:
      operationId: updateFreightAttachment
      tags: [logistics]
      summary: Update freight attachment metadata
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateFreightAttachmentBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FreightAttachment" }
    delete:
      operationId: deleteFreightAttachment
      tags: [logistics]
      summary: Delete a freight attachment
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }

  /logistics/freight-shipments/{shipmentId}/rfqs:
    parameters:
      - { name: shipmentId, in: path, required: true, schema: { type: integer } }
    post:
      operationId: createFreightRfq
      tags: [logistics]
      summary: Create an RFQ for a freight shipment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateFreightRfqBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FreightRfq" }

  /logistics/freight-rfqs:
    get:
      operationId: listFreightRfqs
      tags: [logistics]
      summary: List freight RFQs (optionally filtered by shipmentId)
      parameters:
        - { name: shipmentId, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: RFQ list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FreightRfq" }

  /logistics/freight-rfqs/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    get:
      operationId: getFreightRfq
      tags: [logistics]
      summary: Get a single freight RFQ with its quotes
      responses:
        "200":
          description: RFQ with quotes
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FreightRfqWithQuotes" }
    delete:
      operationId: deleteFreightRfq
      tags: [logistics]
      summary: Delete a freight RFQ and its quotes
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }
    put:
      operationId: updateFreightRfq
      tags: [logistics]
