components:
  schemas:
    Pagination:
      type: object
      required: [page, limit, total, totalPages]
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }

    PaginatedProducts:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Product" }
        pagination:
          $ref: "#/components/schemas/Pagination"

    PaginatedShipments:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Shipment" }
        pagination:
          $ref: "#/components/schemas/Pagination"

    PaginatedSalesDocuments:
      type: object
      required: [data, pagination]
