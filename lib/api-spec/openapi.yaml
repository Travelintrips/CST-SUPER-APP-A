components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, ecommerce, trading, logistics, pos]
        division:
          type: string
      required: [id, email, name, role]

    DashboardSummary:
      type: object
      properties:
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        totalShipments:
          type: integer
        totalStockValue:
          type: number
        todayTransactions:
          type: integer
        lowStockCount:
          type: integer
      required: [totalOrders, totalRevenue, totalShipments, totalStockValue, todayTransactions, lowStockCount]

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
        price:
          type: number
        stock:
          type: integer
        category:
          type: string
        description:
          type: string
        imageUrl:
          type: string
          nullable: true
        defaultSalesTaxId:
          type: integer
          nullable: true
        defaultPurchaseTaxId:
          type: integer
          nullable: true
        createdAt:
          type: string
      required: [id, name, sku, price, stock, category, createdAt]

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        sku:
          type: string
        price:
          type: number
        stock:
          type: integer
        category:
          type: string
        description:
          type: string
        imageUrl:
          type: string
          nullable: true
        defaultSalesTaxId:
          type: integer
          nullable: true
        defaultPurchaseTaxId:
          type: integer
          nullable: true
      required: [name, sku, price, stock, category]

    Order:
      type: object
      properties:
        id:
          type: integer
        customerName:
          type: string
        customerEmail:
          type: string
        status:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]
        totalAmount:
          type: number
        taxAmount:
          type: number
        grandTotal:
          type: number
        items:
          type: string
        createdAt:
          type: string
      required: [id, customerName, customerEmail, status, totalAmount, taxAmount, grandTotal, createdAt]

    CreateOrderBody:
      type: object
      properties:
        customerName:
          type: string
        customerEmail:
          type: string
        items:
          type: string
        totalAmount:
          type: number
        taxAmount:
          type: number
      required: [customerName, customerEmail, items, totalAmount]

