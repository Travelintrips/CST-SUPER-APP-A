      properties:
        role:
          type: string
          enum: [admin, ecommerce, trading, logistics, pos]
        division:
          type: string
          nullable: true
        name:
          type: string
      required: [role]

    UpdateOrderBody:
      type: object
      properties:
        customerName:
          type: string
        customerEmail:
          type: string
        items:
          type: string
        totalAmount:
          type: number
        taxAmount:
          type: number
        status:
          type: string
